apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  labels:
    {{- include "bare-metal-fulfillment-operator.labels" . | nindent 4 }}
  name: {{ include "bare-metal-fulfillment-operator.fullname" . }}-leader-election-rolebinding
  namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "bare-metal-fulfillment-operator.fullname" . }}-leader-election-role
subjects:
- kind: ServiceAccount
  name: {{ include "bare-metal-fulfillment-operator.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
