apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "bare-metal-fulfillment-operator.fullname" . }}-controller-manager
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "bare-metal-fulfillment-operator.labels" . | nindent 4 }}
    control-plane: controller-manager
spec:
  selector:
    matchLabels:
      {{- include "bare-metal-fulfillment-operator.selectorLabels" . | nindent 6 }}
  replicas: {{ .Values.replicaCount }}
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
      labels:
        {{- include "bare-metal-fulfillment-operator.selectorLabels" . | nindent 8 }}
    spec:
      # TODO(user): Uncomment the following code to configure the nodeAffinity expression
      # according to the platforms which are supported by your solution.
      # It is considered best practice to support multiple architectures. You can
      # build your manager image using the makefile target docker-buildx.
      # affinity:
      #   nodeAffinity:
      #     requiredDuringSchedulingIgnoredDuringExecution:
      #       nodeSelectorTerms:
      #         - matchExpressions:
      #           - key: kubernetes.io/arch
      #             operator: In
      #             values:
      #               - amd64
      #               - arm64
      #               - ppc64le
      #               - s390x
      #           - key: kubernetes.io/os
      #             operator: In
      #             values:
      #               - linux
      securityContext:
        # Projects are configured by default to adhere to the "restricted" Pod Security Standards.
        # This ensures that deployments meet the highest security requirements for Kubernetes.
        # For more details, see: https://kubernetes.io/docs/concepts/security/pod-security-standards/#restricted
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
      - command:
        - /manager
        args:
          - --leader-elect
          - --health-probe-bind-address=:8081
          - --metrics-bind-address=:8443
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        name: manager
        ports: []
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - "ALL"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        # TODO(user): Configure the resources accordingly based on the project requirements.
        # More info: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
        env:
          - name: OSAC_BARE_METAL_FULFILLMENT_NAMESPACE
            valueFrom:
              fieldRef:
                fieldPath: metadata.namespace
        volumeMounts:
          - name: inventory-config
            mountPath: /etc/osac/inventory/
          - name: management-config
            mountPath: /etc/osac/management/
          - name: clouds
            mountPath: /etc/openstack/
          - name: profiles
            mountPath: /etc/osac/profile/
      volumes:
        - name: inventory-config
          secret:
            secretName: {{ .Values.secrets.inventoryConfig }}
        - name: management-config
          secret:
            secretName: {{ .Values.secrets.managementConfig }}
        - name: clouds
          secret:
            secretName: {{ .Values.secrets.osClouds }}
        - name: profiles
          configMap:
            name: {{ .Values.configMaps.profiles }}
            optional: true
      serviceAccountName: {{ include "bare-metal-fulfillment-operator.serviceAccountName" . }}
      terminationGracePeriodSeconds: 10
