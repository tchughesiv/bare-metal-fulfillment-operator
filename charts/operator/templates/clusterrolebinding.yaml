apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  labels:
    {{- include "bare-metal-fulfillment-operator.labels" . | nindent 4 }}
  name: {{ include "bare-metal-fulfillment-operator.fullname" . }}-manager-rolebinding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "bare-metal-fulfillment-operator.fullname" . }}-manager-role
subjects:
- kind: ServiceAccount
  name: {{ include "bare-metal-fulfillment-operator.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
