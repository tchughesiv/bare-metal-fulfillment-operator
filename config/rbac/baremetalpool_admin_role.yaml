# This rule is not used by the project bare-metal-fulfillment-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over osac.openshift.io.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: bare-metal-fulfillment-operator
    app.kubernetes.io/managed-by: kustomize
    rbac.authorization.k8s.io/aggregate-to-admin: "true"
  name: baremetalpool-admin-role
rules:
- apiGroups:
  - osac.openshift.io
  resources:
  - baremetalpools
  verbs:
  - '*'
- apiGroups:
  - osac.openshift.io
  resources:
  - baremetalpools/status
  verbs:
  - get
