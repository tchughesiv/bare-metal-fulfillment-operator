name: Helm Lint

on:
  pull_request:
    paths:
      - 'api/**'
      - 'charts/**'
      - 'config/crd/bases/**'
      - 'config/default/**'
      - 'config/manager/**'
      - 'config/rbac/**'
      - 'hack/sync-helm-crds.py'
      - 'hack/sync-helm-operator.py'
      - 'Makefile'
      - '.github/workflows/helm-lint.yaml'

concurrency:
  group: helm-lint-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  helm-crds-sync:
    name: Check Helm CRD sync
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        persist-credentials: false

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: stable

    - name: Verify Helm CRD templates match bases
      run: make check-helm-crds

  helm-lint:
    name: Lint Helm charts
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        persist-credentials: false

    - name: Set up Helm
      uses: azure/setup-helm@v5
      with:
        version: v3.17.0

    - name: Lint operator-crds chart
      run: helm lint charts/operator-crds/

    - name: Lint operator chart
      run: helm lint charts/operator/

    - name: Template operator-crds chart
      run: helm template test charts/operator-crds/ > /dev/null

    - name: Template operator chart
      run: helm template test charts/operator/ > /dev/null
